    <span>Contador de goles</span>
    <div id="show-number"></div>
    <button id="gol">GOL!</button>

    <script>

        const cajita = document.getElementById('show-number');
        const button = document.getElementById('gol');
        let goles = 0;
        cajita.textContent = `Nro de goles: ${goles}`;

        function sumar() {
            goles++;
        cajita.textContent = `Nro de goles: ${goles}`;
        }

        button.addEventListener("click", sumar);
    </script>
</body>
